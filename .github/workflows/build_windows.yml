name: Build Windows

on:
  workflow_dispatch:
    inputs:
      owner:
        description: 构建代码源
        required: true
        default: frg2089
        type: choice
        options:
          - frg2089
          - Notsfsssf
      branch:
        description: 构建代码分支
        default: develop
        type: string

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: 签出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 切换目标代码
        shell: pwsh
        env:
          OWNER: ${{ inputs.owner }}
          BRANCH: ${{ inputs.branch }}
        run: |-
          git remote add source https://github.com/$env:OWNER/pixez-flutter.git
          git fetch source $env:BRANCH
          git rebase FETCH_HEAD
          git remote remove source

      - name: 初始化 DotNet 环境
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: installer/global.json

      - name: 初始化 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          architecture: x64

      - name: 设置 MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: x64
          sdk: 10.0.22000.0
          toolset: 14.41

      - name: 检查环境
        run: |-
          dotnet tool restore
          dotnet gitversion
          flutter doctor

      - name: 构建项目
        run: |-
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          flutter build windows

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: build/windows/x64/runner/Release/**/*
          compression-level: 9

      - name: 构建 MSIX
        shell: pwsh
        if: env.CERTIFICATE != ''
        env:
          CERTIFICATE: ${{ secrets.CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |-
          $base64File = New-TemporaryFile
          $certFile = (New-TemporaryFile).FullName + '.pfx'
          Out-File -InputObject $env:CERTIFICATE -LiteralPath $base64File
          openssl enc -base64 -d -in $base64File.FullName -out $certFile
          dotnet tool restore
          $version = dotnet gitversion | ConvertFrom-Json
          dart run msix:create `
            --certificate-path $certFile `
            --certificate-password $env:CERTIFICATE_PASSWORD `
            --build-windows false `
            --version $version.AssemblySemFileVer `
            --publisher (Get-PfxCertificate $certFile -Password ($env:CERTIFICATE_PASSWORD | ConvertTo-SecureString -AsPlainText)).Subject

      - name: 上传 MSIX
        if: env.CERTIFICATE != ''
        env:
          CERTIFICATE: ${{ secrets.CERTIFICATE }}
        uses: actions/upload-artifact@v4
        with:
          name: msix
          path: build/windows/x64/runner/Release/pixez.msix
          compression-level: 9

      - name: 构建 MSIX 安装器
        shell: pwsh
        if: env.CERTIFICATE != ''
        env:
          CERTIFICATE: ${{ secrets.CERTIFICATE }}
        run: |-
          dotnet tool restore
          $version = dotnet gitversion | ConvertFrom-Json
          dotnet publish installer `
            --configuration Release `
            --artifacts-path build/installer `
            --graph `
            -property:Platform="Any CPU" `
            -property:"Version=$($version.AssemblySemVer)" `
            -property:"FileVersion=$($version.AssemblySemFileVer)" `
            -property:"InformationalVersion=$($version.InformationalVersion)"

      - name: 上传 MSIX 安装器
        if: env.CERTIFICATE != ''
        env:
          CERTIFICATE: ${{ secrets.CERTIFICATE }}
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: build/installer/publish/MsixInstaller/release/MsixInstaller.exe
          compression-level: 9

      - name: 生成校验和
        env:
          CERTIFICATE: ${{ secrets.CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |-
          Write-Output "### Build Success :rocket:" >> $env:GITHUB_STEP_SUMMARY
          if ([string]::IsNullOrEmpty($env:CERTIFICATE)) {
            return;
          }
          $base64File = New-TemporaryFile
          $certFile = (New-TemporaryFile).FullName + '.pfx'
          Out-File -InputObject $env:CERTIFICATE -LiteralPath $base64File
          openssl enc -base64 -d -in $base64File.FullName -out $certFile
          $cert = Get-PfxCertificate $certFile -Password ($env:CERTIFICATE_PASSWORD | ConvertTo-SecureString -AsPlainText)

          Write-Output "|Thumbprint|Subject|" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "|:-:|:-:|" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "|`$($cert.Thumbprint)`|$($cert.Subject)|" >> $env:GITHUB_STEP_SUMMARY
          
          Write-Output "|File|SHA256|" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "|:-|:-:|" >> $env:GITHUB_STEP_SUMMARY

          $checksum = Get-FileHash build/windows/x64/runner/Release/pixez.msix
          $checksum = $checksum.Hash
          Write-Output "|pixez.msix|$checksum|" >> $env:GITHUB_STEP_SUMMARY

          $checksum = Get-FileHash build/installer/publish/MsixInstaller/release/MsixInstaller.exe
          $checksum = $checksum.Hash
          Write-Output "|MsixInstaller.exe|$checksum|" >> $env:GITHUB_STEP_SUMMARY

          Write-Output "" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "### MSIX 安装教程" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "![image](https://github.com/Notsfsssf/pixez-flutter/assets/42184238/f1956682-f527-487d-997b-523319cd78d3)" >> $env:GITHUB_STEP_SUMMARY
